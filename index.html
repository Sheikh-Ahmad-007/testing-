<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamingHub - Watch Movies, Shows & Anime</title>
    <!-- Prevent Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter -->
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return customFetch;
            },
            set: function(val) {
              customFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e1) {
          try {
            var originalFetch = Window.prototype.fetch;
            var customFetch = originalFetch;
            Object.defineProperty(Window.prototype, 'fetch', {
              get: function() {
                return customFetch;
              },
              set: function(val) {
                customFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          } catch (e2) {
            console.warn("Could not patch window.fetch setter:", e2);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
